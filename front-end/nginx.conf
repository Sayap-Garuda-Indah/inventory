server {
  listen 80;
  listen [::]:80;
  server_name sgi-inventory.local;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location / {
    try_files $uri /index.html;
  }

  location = /api { return 301 /api/; }

  location /api/ {
    proxy_pass http://api:8000/;
    proxy_http_version 1.1;
    # FastAPI routes in this app often use a trailing slash (e.g. /users/).
    # When the frontend calls /api/users (no trailing slash), FastAPI may 307-redirect to /users/.
    # Rewrite Location headers so the client stays under /api and doesn't hit the SPA.
    proxy_redirect ~^(/.*)$ /api$1;
    proxy_redirect ~^https?://[^/]+(/.*)$ /api$1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
